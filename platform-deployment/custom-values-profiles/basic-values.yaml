# CM Platform Configuration Values
dns:
  # Base domain for all services. Example: 'cm-platform-prod.example.com'
  baseDomain: <base>.<your-domain>.<com>


# # CNPG backup with pgBackRest.
# # Uncomment and configure to enable.
# db:
#   cnpg:
#     backup:
#       enabled: false # Set to 'true' to enable pgBackRest backup for CNPG.
#       pgBackRest:
#         s3:
#           bucket: <bucket-name>
#           endpointURL: <hostname>
#           # disableVerifyTLS: false
#           # region: dummy
#           accessKeyId: <access-key-id>
#           secretAccessKey: <access-key-secret>
#         encryption:
#           key: <encryption-key> # A custom string to be used by pgBackRest for backup encryption.


# # Source of the TLS certificate.
# # Uncomment and configure the relevant section to use other than default self-signed TLS certificate.
# tls:
#   # # (default) Self-signed certificate generation.
#   # certificateSource: selfsigned
  
#   # # Let's Encrypt certificate generation.
#   # # Requires valid a public domain and email configuration.
#   # certificateSource: letsencrypt
#   # letsEncrypt:
#   #   # Email for Let's Encrypt certificate generation
#   #   email: <admin>@<your-domain>.<com>

#   # # Provide own TLS certificate and private key.
#   # # Requires valid certificate and key files in the 'own-cert' directory.
#   # # helm upgrade --install cm-platform ... \
#   # # ...
#   # # --set-file tls.own.fullchainCertificate=own-cert/fullchain.pem \
#   # # --set-file tls.own.privateKey=own-cert/privkey.pem
#   # certificateSource: own
  

# # Additional dependencies.
# # Uncomment and configure the relevant sections to deploy additional dependencies.
# dependencies:
#   gpu:
#    nvidia:
#      # Deploy Nvidia components
#      enabled: false # Set to 'true' to deploy Nvidia GPU components.
#
#   # Deploy Longhorn CSI storage.
#   #  *Required (usually)* for K3s-like PoC clusters on-premises.
#   #  *Optional* for the most of managed K8s clusters.
#   # IMPORTANT: Longhorn CSI prerequisites on the host OS level:
#   # Debian: 'apt install open-iscsi nfs-common cryptsetup'
#   # RedHat: 'dnf install iscsi-initiator-utils nfs-utils cryptsetup'
#   longhornCsi:
#     enabled: false # Set to 'true' to deploy Longhorn CSI storage.
